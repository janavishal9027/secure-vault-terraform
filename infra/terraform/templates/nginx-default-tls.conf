# Managed by Terraform — do not edit by hand.
#
# Catch-all listeners for ports 80/443 that match when no other vhost claims
# the request's Host / SNI. Without this, nginx falls through to whichever
# 443 vhost loaded first (alphabetical) and serves *its* cert — which leaks
# the wrong identity for any subdomain that doesn't yet have its own vhost
# (e.g. a cluster whose certbot run failed). `ssl_reject_handshake` makes us
# refuse the TLS handshake without ever offering a cert; `444` is nginx's
# "drop the connection" return code, no body sent.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
    return 444;
}
